<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clara Pipeline Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3250;
    --accent: #00d9a3;
    --blue: #4f8fff;
    --warn: #ffb347;
    --danger: #ff5c5c;
    --text: #e8eaf0;
    --muted: #6b7280;
    --purple: #7c3aed;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

  header { padding: 18px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
  .logo { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .logo-icon { background: var(--accent); color: #000; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .layout { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 61px); }
  aside { background: var(--surface); border-right: 1px solid var(--border); padding: 20px 0; }
  .nav-label { font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; padding: 0 20px; margin-bottom: 8px; margin-top: 16px; }
  .nav-item { padding: 9px 20px; cursor: pointer; font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; transition: all .15s; border-left: 3px solid transparent; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(0,217,163,.08); color: var(--accent); border-left-color: var(--accent); }
  .account-item { padding: 8px 20px; cursor: pointer; font-size: 12px; color: var(--muted); transition: all .15s; display: flex; justify-content: space-between; align-items: center; }
  .account-item:hover { background: var(--surface2); color: var(--text); }
  .account-item.selected { background: rgba(79,143,255,.08); color: var(--blue); }
  .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; }
  .badge.v1 { background: rgba(255,179,71,.15); color: var(--warn); }
  .badge.v2 { background: rgba(0,217,163,.15); color: var(--accent); }

  main { padding: 28px 32px; overflow-y: auto; }

  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 28px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .stat-value.green { color: var(--accent); }
  .stat-value.blue { color: var(--blue); }
  .stat-value.orange { color: var(--warn); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px; margin-bottom: 18px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  .field-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .field-row:last-child { border-bottom: none; }
  .field-label { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .field-value { font-weight: 500; text-align: right; max-width: 60%; }
  .field-value.code { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); }
  .field-value.null { color: var(--muted); font-style: italic; font-size: 11px; }

  .diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 18px; }
  .diff-header { padding: 12px 18px; font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .diff-header.v1 { background: rgba(255,92,92,.06); color: var(--danger); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .diff-header.v2 { background: rgba(0,217,163,.06); color: var(--accent); border-bottom: 1px solid var(--border); }
  .diff-cell { padding: 9px 18px; font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.6; border-bottom: 1px solid var(--border); }
  .diff-cell.left { border-right: 1px solid var(--border); }
  .diff-cell.changed-old { background: rgba(255,92,92,.06); color: #ff8080; }
  .diff-cell.changed-new { background: rgba(0,217,163,.06); color: var(--accent); }
  .diff-cell.label { background: var(--surface2); color: var(--muted); font-size: 10px; letter-spacing: .06em; text-transform: uppercase; padding: 5px 18px; }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-family: 'JetBrains Mono', monospace; margin: 2px; }
  .tag.service { background: rgba(79,143,255,.1); color: var(--blue); }
  .tag.emergency { background: rgba(255,92,92,.1); color: var(--danger); }

  .change-item { border-left: 3px solid var(--accent); padding: 10px 14px; background: var(--surface2); border-radius: 0 8px 8px 0; margin-bottom: 8px; }
  .change-field { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); margin-bottom: 4px; }
  .change-from { color: var(--danger); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .change-to { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 11px; }

  .unknown-item { display: flex; gap: 10px; padding: 8px 12px; background: rgba(255,179,71,.06); border: 1px solid rgba(255,179,71,.2); border-radius: 8px; font-size: 12px; margin-bottom: 6px; }

  .run-btn { background: var(--accent); color: #000; border: none; padding: 10px 22px; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; transition: opacity .15s; font-family: 'Inter', sans-serif; }
  .run-btn:hover { opacity: .85; }
  .run-btn:disabled { opacity: .4; cursor: not-allowed; }

  .pipeline-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-size: 12px; font-family: 'JetBrains Mono', monospace; resize: vertical; min-height: 100px; outline: none; transition: border-color .15s; margin-bottom: 12px; }
  .pipeline-input:focus { border-color: var(--accent); }

  .step { display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 12px; color: var(--muted); }
  .step-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); }
  .step.done .step-icon { background: rgba(0,217,163,.15); border-color: var(--accent); color: var(--accent); }
  .step.done { color: var(--text); }
  .step.active .step-icon { background: rgba(79,143,255,.15); border-color: var(--blue); animation: pulse 1s infinite; }
  .step.active { color: var(--blue); }
  .step.error .step-icon { background: rgba(255,92,92,.15); border-color: var(--danger); color: var(--danger); }
  .step.error { color: var(--danger); }

  .result-card { background: rgba(0,217,163,.06); border: 1px solid rgba(0,217,163,.2); border-radius: 12px; padding: 18px 20px; margin-top: 16px; animation: fadeIn .3s ease; }

  .chat-bubble { max-width: 78%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; margin-bottom: 12px; animation: fadeIn .2s ease; }
  .chat-bubble.agent { background: rgba(0,217,163,.08); border: 1px solid rgba(0,217,163,.15); border-top-left-radius: 4px; }
  .chat-bubble.user { background: var(--surface2); border-top-right-radius: 4px; margin-left: auto; text-align: right; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-icon">🎙</div>Clara Pipeline</div>
  <div class="status"><div class="dot"></div>Pipeline Active</div>
</header>

<div class="layout">
  <aside>
    <div class="nav-label">Views</div>
    <div class="nav-item active" onclick="showView('overview',this)">📊 Overview</div>
    <div class="nav-item" onclick="showView('run',this)">🚀 Run Pipeline</div>
    <div class="nav-item" onclick="showView('account',this)">🏢 Account Detail</div>
    <div class="nav-item" onclick="showView('diff',this)">🔀 Diff Viewer</div>
    <div class="nav-item" onclick="showView('changelog',this)">📋 Changelog</div>
    <div class="nav-label">Accounts</div>
    <div id="accountList"></div>
  </aside>
  <main id="mainContent"></main>
</div>

<script>
const API_URL = "https://clara-pipeline-api.onrender.com";

const ACCOUNTS = [
  {
    id: "ben-s-electrical-solutio-bdce",
    company: "Ben's Electric Solutions",
    hasV1: true, hasV2: true,
    retell_agent_id: null,
    v1: {
      business_hours: { days: null, start: null, end: null, timezone: null },
      services: ["electrical service calls", "quotes and estimates"],
      emergencies: [], emergency_contact: "Ben", emergency_phone: null,
      pricing: { fee: null, hourly: null }, special_clients: [],
      unknowns: ["Business hours not confirmed","Emergency phone number not provided","Pricing not discussed","Notification email not provided"]
    },
    v2: {
      business_hours: { days: "Monday-Friday", start: null, end: null, timezone: null },
      services: ["New client inquiries","Service calls","Scheduling","Quote inquiries"],
      emergencies: ["GNM Pressure Washing after hours emergency calls"],
      emergency_contact: "Ben", emergency_phone: "Ben's second number (pending)",
      pricing: { fee: "$115 callout", hourly: "$98/hr residential" },
      special_clients: ["GNM Pressure Washing (Chevron/Esso gas stations, ~20 locations)"],
      unknowns: ["Business hours start/end not stated","Ben's second phone number pending","Transfer timeout not specified"]
    },
    changes: [
      { field: "services_supported", action: "items_added", added: ["New client inquiries","Service calls","Scheduling","Quote inquiries"] },
      { field: "emergency_definition", action: "items_added", added: ["GNM Pressure Washing after hours emergency"] },
      { field: "special_clients", action: "items_added", added: ["GNM Pressure Washing"] },
      { field: "pricing.service_call_fee", from: "null", to: "$115 callout fee" },
      { field: "pricing.hourly_rate", from: "null", to: "$98/hr residential" },
      { field: "notification_preferences.email", from: "null", to: "info@benselectricalsolutionsteam.com" },
      { field: "after_hours_flow_summary", from: "null", to: "No emergency dispatch except GNM Pressure Washing" },
      { field: "office_hours_flow_summary", from: "null", to: "Ben handles calls, Clara as first contact" }
    ]
  }
];

let currentAccount = ACCOUNTS[0];
let currentView = 'overview';
let agentHistory = [];
let agentListening = false;
let agentRecognition = null;

function renderSidebar() {
  document.getElementById('accountList').innerHTML = ACCOUNTS.map(a => `
    <div class="account-item ${a.id===currentAccount.id?'selected':''}" onclick="selectAccount('${a.id}')">
      <span>${a.company}</span>
      <span>${a.hasV1?'<span class="badge v1">v1</span>':''}${a.hasV2?'<span class="badge v2">v2</span>':''}</span>
    </div>`).join('');
}

function selectAccount(id) {
  currentAccount = ACCOUNTS.find(a => a.id === id);
  renderSidebar();
  renderCurrentView();
}

function showView(view, el) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  renderCurrentView();
}

function renderCurrentView() {
  ({overview:renderOverview, run:renderRun, account:renderAccount, diff:renderDiff, changelog:renderChangelog, agent:renderAgent})[currentView]?.();
}

// ── OVERVIEW ──────────────────────────────────────────────────────────────
function renderOverview() {
  const total=ACCOUNTS.length, v2Count=ACCOUNTS.filter(a=>a.hasV2).length;
  const unknowns=ACCOUNTS.reduce((s,a)=>s+(a.v2||a.v1).unknowns.length,0);
  const changes=ACCOUNTS.reduce((s,a)=>s+a.changes.length,0);
  document.getElementById('mainContent').innerHTML = `
    <div class="fade">
      <div style="margin-bottom:24px">
        <div style="font-size:20px;font-weight:700;margin-bottom:4px">Pipeline Overview</div>
        <div style="color:var(--muted);font-size:13px">Demo → Agent v1 → Retell → Onboarding → Agent v2</div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-label">Accounts</div><div class="stat-value blue">${total}</div><div class="stat-sub">in pipeline</div></div>
        <div class="stat"><div class="stat-label">Onboarded</div><div class="stat-value green">${v2Count}</div><div class="stat-sub">v2 ready</div></div>
        <div class="stat"><div class="stat-label">Open Questions</div><div class="stat-value orange">${unknowns}</div><div class="stat-sub">need clarification</div></div>
        <div class="stat"><div class="stat-label">Total Changes</div><div class="stat-value">${changes}</div><div class="stat-sub">v1→v2 updates</div></div>
      </div>
      <div class="card">
        <div class="card-title">🔄 Pipeline Flow</div>
        <div style="display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:12px;flex-wrap:wrap">
          ${['Transcript','→','Gemini Extract','→','Memo JSON','→','Agent Spec','→','Retell Agent','→','GitHub Issue','→','v2 on Onboarding'].map(s=>
            s==='→'?`<span style="color:var(--border)">${s}</span>`
            :`<span style="background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:6px">${s}</span>`
          ).join('')}
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:14px;font-weight:600">Accounts</div>
        <button class="run-btn" onclick="showView('run',document.querySelectorAll('.nav-item')[1])">+ Run New Pipeline</button>
      </div>
      ${ACCOUNTS.map(a=>`
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;margin-bottom:10px;transition:border-color .15s"
             onclick="selectAccount('${a.id}');showView('account',document.querySelectorAll('.nav-item')[2])"
             onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
          <div style="font-size:28px">⚡</div>
          <div style="flex:1">
            <div style="font-weight:600">${a.company}</div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px">${a.id}</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            ${a.hasV1?'<span class="badge v1" style="padding:4px 10px">v1</span>':''}
            ${a.hasV2?'<span class="badge v2" style="padding:4px 10px">v2</span>':'<span style="color:var(--warn);font-size:11px">⏳ awaiting onboarding</span>'}
            ${(a.v2||a.v1).unknowns.length>0
              ?`<span style="background:rgba(255,179,71,.1);color:var(--warn);font-size:10px;padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace">⚠ ${(a.v2||a.v1).unknowns.length} unknown</span>`
              :'<span style="background:rgba(0,217,163,.1);color:var(--accent);font-size:10px;padding:3px 8px;border-radius:4px">✓ clean</span>'}
          </div>
        </div>`).join('')}
    </div>`;
}

// ── RUN PIPELINE ──────────────────────────────────────────────────────────
function renderRun() {
  document.getElementById('mainContent').innerHTML = `
    <div class="fade">
      <div style="margin-bottom:24px">
        <div style="font-size:20px;font-weight:700;margin-bottom:4px">Run Pipeline</div>
        <div style="color:var(--muted);font-size:13px">Paste transcript → Gemini extracts → Retell agent created automatically</div>
      </div>
      <div class="card">
        <div class="card-title">📋 Call Transcript</div>
        <textarea class="pipeline-input" id="transcriptInput"
          placeholder="Paste any call transcript here...

Example: Hi this is Sarah from Green Valley Plumbing. We need Clara to handle calls. Office hours Monday to Friday 8am to 5pm Pacific. Emergency contact Mike at 503-555-0199. We do residential plumbing, drain cleaning, water heater repairs. Pricing is $95 callout fee plus $90 per hour."></textarea>
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
          <select id="callType" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px;font-family:inherit">
            <option value="demo">Demo Call → v1</option>
            <option value="onboarding">Onboarding Call → v2</option>
          </select>
          <button class="run-btn" id="runBtn" onclick="runPipeline()">▶ Run Pipeline</button>
          <button onclick="loadExample()" style="background:transparent;border:1px solid var(--border);border-radius:8px;padding:9px 16px;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit">Load Example</button>
        </div>
        <div id="pipelineSteps" style="display:none;margin-bottom:8px">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Pipeline Progress</div>
          <div class="step" id="step1"><div class="step-icon">1</div>Sending transcript to Gemini</div>
          <div class="step" id="step2"><div class="step-icon">2</div>Extracting account memo</div>
          <div class="step" id="step3"><div class="step-icon">3</div>Generating agent spec</div>
          <div class="step" id="step4"><div class="step-icon">4</div>Creating agent on Retell</div>
          <div class="step" id="step5"><div class="step-icon">5</div>Creating GitHub issue</div>
        </div>
        <div id="pipelineResult"></div>
      </div>
      <div class="card">
        <div class="card-title">💡 Quick Examples</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${[
            ['Green Valley Plumbing','Plumbing, Mike on call 503-555-0199, Mon-Fri 8-5 Pacific, $95 callout'],
            ['Apex HVAC Services','HVAC company, 24/7 emergency 614-555-0100, $115 service call fee'],
            ['City Electric Co','Electrical contractor, Ben primary contact, Mon-Fri 9-5 Eastern'],
            ['FastFix Appliance','Appliance repair, same day service, $75 diagnosis fee, all major brands']
          ].map(([name,desc])=>`
            <div onclick="loadQuickExample('${name}','${desc}')"
              style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;transition:border-color .15s"
              onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
              <div style="font-weight:600;font-size:12px;margin-bottom:3px">${name}</div>
              <div style="font-size:11px;color:var(--muted)">${desc}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
}

function loadExample() {
  document.getElementById('transcriptInput').value = `Hi, this is Sarah from Green Valley Plumbing. We need Clara to handle our incoming calls. Our office hours are Monday to Friday, 8am to 5pm Pacific time. For emergencies, please contact Mike at 503-555-0199. We handle residential plumbing repairs, drain cleaning, water heater installation, and leak detection. Pricing is $95 callout fee which covers the first half hour, then $90 per hour. Please mention pricing only if the caller asks. Send email notifications to info@greenvalleyplumbing.com after each call.`;
}

function loadQuickExample(name, desc) {
  document.getElementById('transcriptInput').value = `This is a call setup for ${name}. ${desc}. Please configure Clara accordingly.`;
}

function setStep(id, status) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = `step ${status}`;
  el.querySelector('.step-icon').textContent = {active:'⟳',done:'✓',error:'✗'}[status] || id.replace('step','');
}

const delay = ms => new Promise(r => setTimeout(r, ms));

async function runPipeline() {
  const transcript = document.getElementById('transcriptInput').value.trim();
  const callType = document.getElementById('callType').value;
  if (!transcript) { alert('Please paste a transcript first'); return; }

  const btn = document.getElementById('runBtn');
  btn.disabled = true; btn.textContent = 'Running...';

  document.getElementById('pipelineSteps').style.display = 'block';
  document.getElementById('pipelineResult').innerHTML = '';

  ['step1','step2','step3','step4','step5'].forEach(s => {
    const el = document.getElementById(s);
    el.className = 'step';
    el.querySelector('.step-icon').textContent = s.replace('step','');
  });

  setStep('step1','active');

  try {
    await delay(300); setStep('step1','done'); setStep('step2','active');
    await delay(300); setStep('step2','done'); setStep('step3','active');

    // 🔥 CALL N8N WEBHOOK DIRECTLY
    const res = await fetch("https://sheshaadri.app.n8n.cloud/webhook/clara/demo", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ transcript, call_type: callType })
    });

    const data = await res.json();

    if (!data.success) throw new Error(data.error || 'Pipeline failed');

    setStep('step3','done'); setStep('step4','active');
    await delay(500); setStep('step4','done'); setStep('step5','active');
    await delay(300); setStep('step5','done');

    // 🔥 EXPECT DATA FROM N8N
    const memo = data.memo || {};
    const accountId = memo.account_id || data.account_id || "unknown";

    if (!ACCOUNTS.find(a => a.id === accountId)) {
      ACCOUNTS.push({
        id: accountId,
        company: memo.company_name || data.company || 'Unknown Company',
        retell_agent_id: data.retell?.agent_id || data.agent_id || null,
        hasV1: true,
        hasV2: false,
        v1: {
          business_hours: memo.business_hours || {},
          services: memo.services_supported || [],
          emergencies: memo.emergency_definition || [],
          emergency_contact: memo.emergency_routing_rules?.primary_contact,
          emergency_phone: memo.emergency_routing_rules?.phone_number,
          pricing: {
            fee: memo.pricing?.service_call_fee,
            hourly: memo.pricing?.hourly_rate
          },
          special_clients: memo.special_clients || [],
          unknowns: memo.questions_or_unknowns || []
        },
        v2: null,
        changes: []
      });

      currentAccount = ACCOUNTS[ACCOUNTS.length - 1];
      renderSidebar();
    }

        </div>

        <div class="field-row">
          <span class="field-label">account_id</span>

        ${data.issue_url ? `

    ['step1','step2','step3','step4','step5'].forEach(s => {

    });

    document.getElementById('pipelineResult').innerHTML = `

async function agentSend(text) {
  const input = document.getElementById('agentInput');
  const message = text || input?.value?.trim();
  if (!message) return;
  if (input) { input.value=''; agentResize(input); }
  agentAddMsg('user', message);
  document.getElementById('agentTyping').style.display = 'flex';
  document.getElementById('agentSendBtn').disabled = true;
  try {
    const res = await fetch(`${API_URL}/chat`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message, history:agentHistory, company:'Apex Home Services', business_hours:'Monday to Friday 8am to 6pm', emergency_phone:'our on-call technician'})
    });
    const data = await res.json();
    document.getElementById('agentTyping').style.display = 'none';
    document.getElementById('agentSendBtn').disabled = false;
    if (data.reply) {
      agentAddMsg('agent', data.reply);
      agentHistory.push({role:'user',content:message});
      agentHistory.push({role:'model',content:data.reply});
      if (data.audio) new Audio(`data:audio/mp3;base64,${data.audio}`).play().catch(()=>{});
    }
  } catch(e) {
    document.getElementById('agentTyping').style.display = 'none';
    document.getElementById('agentSendBtn').disabled = false;
    agentAddMsg('agent', "I'm having a connection issue. Please try again.");
  }
}

function agentAddMsg(role, text) {
  const msgs = document.getElementById('agentMessages');
  if (!msgs) return;
  const isAgent = role==='agent';
  const wrap = document.createElement('div');
  wrap.style.cssText = `display:flex;gap:8px;margin-bottom:12px;${!isAgent?'flex-direction:row-reverse':''}`;
  wrap.innerHTML = `<div style="width:28px;height:28px;border-radius:50%;background:${isAgent?'linear-gradient(135deg,#7c3aed,#06b6d4)':'#2e3250'};display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px">${isAgent?'🎙':'👤'}</div><div class="chat-bubble ${role}">${text}</div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function agentKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();agentSend();} }
function agentResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,80)+'px'; }

function toggleAgentMic() {
  if (agentListening) { if(agentRecognition)agentRecognition.stop(); agentListening=false; document.getElementById('agentMicBtn').innerHTML='🎤'; document.getElementById('agentMicBtn').style.background='var(--surface)'; return; }
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if (!SR) { alert('Use Chrome for voice input'); return; }
  agentRecognition = new SR();
  agentRecognition.lang = 'en-US';
  agentRecognition.onstart = () => { agentListening=true; document.getElementById('agentMicBtn').innerHTML='⏹'; document.getElementById('agentMicBtn').style.background='rgba(239,68,68,.2)'; };
  agentRecognition.onresult = (e) => { agentSend(e.results[0][0].transcript); agentListening=false; document.getElementById('agentMicBtn').innerHTML='🎤'; document.getElementById('agentMicBtn').style.background='var(--surface)'; };
  agentRecognition.onerror = () => { agentListening=false; document.getElementById('agentMicBtn').innerHTML='🎤'; };
  agentRecognition.start();
}
